<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f5f7;
      padding: 40px;
      color: #1a1a2e;
    }

    .oj-dropdown {
      position: relative;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="oj-dropdown" data-single>
    <button class="oj-dropdown-button">🌐 <span>English</span></button>
    <div class="oj-dropdown-content">
      <button data-selected>English</button>
      <button>Nederlands</button>
      <button>Deutsch</button>
      <button>Français</button>
      <button>Español</button>
      <button>Português</button>
      <button>日本語</button>
    </div>
  </div>

  <script>
    class OJDropdown {
    }

    for (const el of document.querySelectorAll(".oj-dropdown"))
      new OJDropdown(el)
  </script>
</body>

</html>
