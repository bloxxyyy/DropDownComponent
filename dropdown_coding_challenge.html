<!DOCTYPE html>
<html lang = "en">

<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
  <title>Dropdown</title>

  <style>

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin    : 0;
      padding   : 0;
    }

    body {
      font-family     : -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f5f7;
      padding         : 40px;
      color           : #1a1a2e;
    }

    .oj-dropdown {
      position: relative;
      display : inline-block;
    }

    .oj-dropdown-content {
      display : none;
      position: absolute;
    }

    .oj-dropdown.open .oj-dropdown-content {
      display: block;
    }

  </style>

</head>

<body>

  <div class="oj-dropdown" data-single>
    <button class="oj-dropdown-button">🌐 <span>English</span></button>

    <div class="oj-dropdown-content">
      <button data-selected>English</button>
      <button>Nederlands</button>
      <button>Deutsch</button>
      <button>Français</button>
      <button>Español</button>
      <button>Português</button>
      <button>日本語</button>
    </div>
  </div>

  <script>

    class OJDropdown {

      constructor(rootElement) {

        this.rootElement = rootElement;

        this.cacheDomElements();
        this.initializeState();
        this.initializeOptions();
        this.bindEventListeners();

        this.render();

      }

      cacheDomElements() {

        this.dom = {
          rootElement    : this.rootElement,
          toggleButton   : this.rootElement.querySelector('.oj-dropdown-button'),
          buttonLabel    : this.rootElement.querySelector('.oj-dropdown-button span'),
          dropdownContent: this.rootElement.querySelector('.oj-dropdown-content'),

          dropdownOptionElements: Array.from(this.rootElement.querySelectorAll('.oj-dropdown-content button'))
        };

        this.dom.dropdownContent.id = this.dom.dropdownContent.id || this.generateId();

        this.dom.toggleButton.setAttribute('aria-haspopup', 'listbox');
        this.dom.dropdownContent.setAttribute('role', 'listbox');

      }

      generateId(prefix = 'oj-dropdown') {
        return `${prefix}-${Math.random().toString(36).slice(2)}`;
      }

      initializeState() {

        this.state = {
          isOpen             : false,
          selectedOptionIndex: this.dom.dropdownOptionElements.findIndex(button => button.hasAttribute('data-selected')),
          focusedOptionIndex : -1
        };

      }

      initializeOptions() {

        this.options = this.dom.dropdownOptionElements.map((button, index) => {

          button.setAttribute('role', 'option');

          return {
            optionElement: button,
            label        : button.textContent,
            value        : button.dataset.value || button.textContent,
            selected     : button.hasAttribute('data-selected'),
            index
          };

        });

      }

      bindEventListeners() {

        this.dom.toggleButton.addEventListener('click', (event) => this.onToggleButtonClick(event));
        this.dom.toggleButton.addEventListener('keydown', (event) => this.onToggleButtonKeyDown(event));

        this.options.forEach((option) => {
          option.optionElement.addEventListener('click', (event) => this.onDropdownOptionClick(event, option.index));
          option.optionElement.addEventListener('keydown', (event) => this.onOptionKeyDown(event, option.index));
        });

        document.addEventListener('click', (event) => {
          if (!this.dom.rootElement.contains(event.target) && this.state.isOpen) {
            this.close();
            this.render();
          }
        });

      }

      onToggleButtonClick(event) {

        if (this.state.isOpen) {
          this.close();
          this.render();
        } else {
          this.open();
          this.state.focusedOptionIndex = 
            this.state.selectedOptionIndex >= 0 ? this.state.selectedOptionIndex : 0;

          this.render();
          this.focusOption(this.state.focusedOptionIndex);
        }

      }

      onDropdownOptionClick(event, index) {

        this.selectOption(index);
        this.close();
        this.render();
        
      }

      onToggleButtonKeyDown(event) {

        if (event.key === 'ArrowDown') {

          event.preventDefault();

          this.open();
          this.state.focusedOptionIndex = this.state.selectedOptionIndex >= 0 ? this.state.selectedOptionIndex : 0;

          this.render();
          this.focusOption(this.state.focusedOptionIndex);

        }

      }

      focusOption(index) {

        const option = this.options[index];

        if (option) {
          option.optionElement.focus();
        }

      }

      onOptionKeyDown(event, index) {

        if (event.key === 'ArrowDown') {

          event.preventDefault();

          const nextIndex = (index + 1) % this.options.length;
          this.state.focusedOptionIndex = nextIndex;

          this.focusOption(nextIndex);

        }

        if (event.key === 'ArrowUp') {

          event.preventDefault();

          const prevIndex = (index - 1 + this.options.length) % this.options.length;
          this.state.focusedOptionIndex = prevIndex;

          this.focusOption(prevIndex);

        }

        if (event.key === 'Enter') {

          event.preventDefault();

          this.selectOption(index);
          this.close();
          this.render();

          this.dom.toggleButton.focus();

        }

        if (event.key === 'Escape') {

          this.close();
          this.render();

          this.dom.toggleButton.focus();

        }

        if (event.key === 'Tab') {

          this.close();
          this.render();

        }

      }

      open() {

        if (!this.state.isOpen) {
          this.state.isOpen = true;
        }

      }

      close() {

        if (this.state.isOpen) {
          this.state.isOpen             = false;
          this.state.focusedOptionIndex = -1;
        }

      }

      selectOption(index) {

        const option = this.options[index];

        if (option) {

          this.state.selectedOptionIndex = index;

          this.options.forEach(opt => opt.selected = false);
          option.selected = true;

        }

      }

      render() {

        if (this.state.isOpen) {
          this.dom.rootElement.classList.add('open');
        } else {
          this.dom.rootElement.classList.remove('open');
        }

        this.dom.toggleButton.setAttribute('aria-expanded', this.state.isOpen);
        this.dom.toggleButton.setAttribute('aria-controls', this.dom.dropdownContent.id);

        const selectedOption = this.options[this.state.selectedOptionIndex];

        if (selectedOption) {
          this.dom.buttonLabel.textContent = selectedOption.label;
        }

        this.options.forEach(opt => {

          if (opt.selected) {
            opt.optionElement.setAttribute('data-selected', '');
          } else {
            opt.optionElement.removeAttribute('data-selected');
          }

          opt.optionElement.setAttribute('aria-selected', opt.selected);

        });

      }

    }

    for (const el of document.querySelectorAll(".oj-dropdown"))
      new OJDropdown(el)

  </script>

</body>

</html>
